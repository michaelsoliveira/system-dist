services:
  postgres:
    image: postgis/postgis
    environment:
      PGUSER: postgres
      POSTGRES_USER: postgres
      POSTGRES_PGPASSWORD: postgres
      POSTGRES_DB: system-dist
      PGPORT: 5432
    ports:
      - "5432:5432"
    restart: unless-stopped
    # expose: 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - system-dist
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:7
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - system-dist
    environment:
      PGADMIN_DEFAULT_EMAIL: michaelsoliveira@gmail.com
      PGADMIN_DEFAULT_PASSWORD: secret
       
  backend:
    build:
      context: ./backend
      dockerfile: ./docker/${ENVIRONMENT}/app/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/system-dist
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - system-dist

volumes:
  postgres_data:
    name: postgres_data
    external: true
  pgadmin_data:
    name: pgadmin_data
    external: true

networks:
  system-dist:
    name: system-dist
    external: true